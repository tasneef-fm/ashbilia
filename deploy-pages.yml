name: نشر تطبيق وردة أشبيليا

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: جلب الملفات
        uses: actions/checkout@v4

      - name: تجهيز GitHub Pages
        uses: actions/configure-pages@v5

      - name: تجهيز نسخة النشر
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p _site
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='_site/' \
            --exclude='supabase/' \
            --exclude='README.md' \
            --exclude='ابدأ-من-هنا.txt' \
            ./ _site/

          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            cat > _site/config.js <<EOF
          window.WARDAT_CONFIG = Object.freeze({
            supabaseUrl: '${SUPABASE_URL}',
            supabaseAnonKey: '${SUPABASE_ANON_KEY}'
          });
          EOF
          fi

      - name: رفع ملفات Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: النشر
        id: deployment
        uses: actions/deploy-pages@v4
